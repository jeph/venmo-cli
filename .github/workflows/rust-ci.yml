name: Rust CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.95.0 --profile minimal --component clippy,rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint all targets
        run: cargo clippy --locked --all-targets --all-features -- -D warnings -D clippy::unwrap_used -D clippy::expect_used

      - name: Test all targets
        run: cargo test --locked --all-targets --all-features

      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --locked --no-deps

  supply-chain:
    name: Supply-chain policy
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.95.0 --profile minimal

      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.20.2 --locked

      - name: Check advisories, bans, licenses, and sources
        run: cargo deny check
